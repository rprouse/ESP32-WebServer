; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:nodemcu-32s]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = nodemcu-32s
framework = arduino
monitor_speed = 115200
build_flags =
    -DSTATUS_LED_PIN=2
    -DSTATUS_LED_IS_RGB=0
lib_deps =
    ESP32Async/ESPAsyncWebServer
    ESP32Async/AsyncTCP

; Freenove ESP32 3.5 and 4in LCDs
; https://docs.freenove.com/projects/fnk0103/en/latest/
[env:freenove_esp32_lcd]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = freenove_esp32_wrover
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.filesystem = littlefs

; Configure PSRAM and Flash Memory Type
; Most 4" Freenove boards use QIO/OPI mode for PSRAM and QIO for Flash
;board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 4MB

; Enable PSRAM (Critical for 4" LCD UI frameworks like LVGL)
build_flags =
    -DBOARD_HAS_PSRAM
    -DSTATUS_LED_PIN=22
    -DSTATUS_LED_IS_RGB=0
lib_deps =
    ESP32Async/ESPAsyncWebServer
    ESP32Async/AsyncTCP

; Use the UART port for serial monitor and programming.
[env:esp32-s3-devkitc-1-uart]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
board_upload.flash_size = 16MB
board_build.arduino.memory_type = qio_opi
monitor_speed = 115200
build_flags =
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DSTATUS_LED_PIN=47
    -DSTATUS_LED_IS_RGB=1
lib_deps =
    ESP32Async/ESPAsyncWebServer
    ESP32Async/AsyncTCP

; This board has two USB ports. If both are plugged in,
; we need to specify which port to use based on the USB VID/PID.
;upload_port = hwid:1A86:55D3
;monitor_port = hwid:1A86:55D3
;upload_port = COM15
;monitor_port = COM15

[env:esp32-s3-zero]
; Waveshare ESP32-S3-Zero (ESP32-S3FH4R2: 4MB flash, 2MB QSPI PSRAM), native USB only.
; pioarduino's built-in board sets HWCDC (ARDUINO_USB_MODE=1) but -- unlike the C3 board
; and unlike our old local JSON -- does NOT set ARDUINO_USB_CDC_ON_BOOT. Without it the
; core routes Serial to UART0 (physical pins), so nothing reaches USB: the LED still
; blinks but the monitor stays blank. So we add CDC-on-boot back below. With it, Serial
; is HWCDC over USB-Serial-JTAG on ONE stable port (303A:1001) for both flashing and
; running -- no more TinyUSB port-switch (303A:822B) the old 2.0.17 USB_MODE=0 setup had.
; Testing this HWCDC-on-the-S3 path is the main point of the pioarduino migration.
; To go back to the TinyUSB CDC path instead: build_flags = -DARDUINO_USB_MODE=0 -DARDUINO_USB_CDC_ON_BOOT=1
; (expect a macro-redefinition warning since the board already defines USB_MODE as 1).
; Upload workflow (SAME for both boards): enter BOOT mode to flash, press RESET to run.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = waveshare_esp32_s3_zero
framework = arduino
board_build.partitions = default.csv
monitor_speed = 115200
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DSTATUS_LED_PIN=21
    -DSTATUS_LED_IS_RGB=1
lib_deps =
    ESP32Async/ESPAsyncWebServer
    ESP32Async/AsyncTCP

[env:esp32-c3-supermini]
; Nologo ESP32-C3 SuperMini (4MB flash). C3 has only USB-Serial-JTAG (no USB-OTG),
; so it uses HWCDC (ARDUINO_USB_MODE=1, the board default), Serial on 303A:1001.
; Upload workflow (SAME for both boards): enter BOOT mode to flash, press RESET to run.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = nologo_esp32c3_super_mini
framework = arduino
board_build.partitions = default.csv
monitor_speed = 115200
build_flags =
    -DSTATUS_LED_PIN=8
    -DSTATUS_LED_IS_RGB=0
lib_deps =
    ESP32Async/ESPAsyncWebServer
    ESP32Async/AsyncTCP
