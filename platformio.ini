; https://docs.platformio.org/page/projectconf.html
[platformio]
default_envs = nodemcu-32s
extra_configs =
	variants/*/envs/*.ini
boards_dir = boards
src_dir = src

[env]
monitor_speed = 115200
upload_speed = 921600
monitor_filters =
	default
	esp32_exception_decoder

[arduino_base]
extends = env
framework = arduino
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
lib_deps =
    ESP32Async/ESPAsyncWebServer
    ESP32Async/AsyncTCP

; NOTE: Board-specific environments (including tlora_pager_sx1262)
; are defined in variants/*/envs/*.ini and loaded via extra_configs above.
; Keep root config focused on shared settings only.

; Each board variant must define STATUS_LED_PIN and STATUS_LED_IS_RGB in its envs/*.ini file.
; build_flags =
;    -DSTATUS_LED_PIN=8
;    -DSTATUS_LED_IS_RGB=0
